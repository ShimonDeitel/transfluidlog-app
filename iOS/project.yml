name: Transmission Fluid Log
options:
  bundleIdPrefix: com.shimondeitel.transfluidlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Transmission Fluid Log:
    type: application
    platform: iOS
    sources:
      - path: Transmission Fluid Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.transfluidlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Transmission Fluid Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Transmission Fluid LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Transmission Fluid LogTests
      - path: Transmission Fluid Log.storekit
    dependencies:
      - target: Transmission Fluid Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.transfluidlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Transmission Fluid LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Transmission Fluid LogUITests
    dependencies:
      - target: Transmission Fluid Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.transfluidlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Transmission Fluid Log:
    build:
      targets:
        Transmission Fluid Log: all
        Transmission Fluid LogTests: [test]
        Transmission Fluid LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Transmission Fluid Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Transmission Fluid Log.storekit
      targets:
        - Transmission Fluid LogTests
        - Transmission Fluid LogUITests
    archive:
      config: Release
